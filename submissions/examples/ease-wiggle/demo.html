<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-wiggle | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      gap: 3rem;
    }

    h1 {
      color: #ffffff;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      opacity: 0.5;
      text-transform: uppercase;
    }

    .demo-row {
      display: flex;
      gap: 3rem;
      align-items: flex-end;
    }

    /* --- Notification Bell --- */
    .bell-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      cursor: pointer;
    }

    .bell {
      position: relative;
      width: 56px;
      height: 56px;
      background: #1e1e2e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #7c6ef7;
      font-size: 1.6rem;
      transition: border-color 0.3s;
    }

    .bell:hover { border-color: #a78bfa; }

    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #f87171;
      color: white;
      font-size: 0.6rem;
      font-weight: bold;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bell-label {
      color: #a0a0c0;
      font-size: 0.75rem;
    }

    /* --- CTA Button --- */
    .cta-btn {
      padding: 0.75rem 1.8rem;
      background: linear-gradient(135deg, #7c6ef7, #a78bfa);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.2s;
    }

    .cta-btn:hover { opacity: 0.85; }

    /* --- Empty State Card --- */
    .empty-card {
      background: #1e1e2e;
      border: 2px dashed #3a3a5c;
      border-radius: 16px;
      padding: 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      cursor: pointer;
      transition: border-color 0.3s;
    }

    .empty-card:hover { border-color: #7c6ef7; }

    .empty-icon { font-size: 2.2rem; }

    .empty-text {
      color: #a0a0c0;
      font-size: 0.85rem;
    }

    .hint {
      color: #ffffff30;
      font-size: 0.75rem;
      margin-top: -1rem;
    }
  </style>
</head>
<body>

  <h1>wiggle — Click anything to replay</h1>

  <div class="demo-row">

    <!-- Bell -->
    <div class="bell-wrapper" onclick="wiggle(this.querySelector('.bell'))">
      <div class="bell wiggle">
        🔔
        <span class="badge">3</span>
      </div>
      <span class="bell-label">Notifications</span>
    </div>

    <!-- CTA Button -->
    <button class="cta-btn wiggle" onclick="wiggle(this)">
      ✨ Try for Free
    </button>

    <!-- Empty State -->
    <div class="empty-card" onclick="wiggle(this.querySelector('.empty-icon'))">
      <div class="empty-icon wiggle">📭</div>
      <span class="empty-text">No messages yet</span>
    </div>

  </div>

  <p class="hint">↑ click any element to replay the wiggle</p>

  <script>
    function wiggle(el) {
      el.classList.remove('wiggle');
      void el.offsetWidth;
      el.classList.add('wiggle');
    }

    document.querySelectorAll('.wiggle').forEach(el => wiggle(el));
  </script>

</body>
</html>
